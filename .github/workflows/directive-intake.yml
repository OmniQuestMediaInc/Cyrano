# GOV-CONST-001 Commit 2 of 2 — Directive Intake Automation
# Watches PROGRAM_CONTROL/DIRECTIVES/QUEUE on push to main.
# On any new .md file detected: opens a GitHub Issue tagged 'copilot-task'
# with the directive content as the body.
name: Directive Intake — Auto-Issue on Queue Push

on:
  push:
    branches: [main]
    paths:
      - 'PROGRAM_CONTROL/DIRECTIVES/QUEUE/**.md'

permissions:
  contents: read
  issues: write

jobs:
  open-directive-issue:
    name: Open Copilot-task issue for each new directive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 2

      - name: Detect newly added directive files
        id: detect
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'PROGRAM_CONTROL/DIRECTIVES/QUEUE/*.md' | grep -v '\.gitkeep$' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "No new directive files detected. Exiting cleanly."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "Detected new directive files:"
            echo "$NEW_FILES"
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            {
              echo "new_files<<EOF"
              echo "$NEW_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open Issue per new directive
        if: steps.detect.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            ID=$(basename "$FILE" .md)
            TITLE="DIRECTIVE: ${ID}"
            echo "Opening issue for ${ID} (${FILE})"
            PR_INSTRUCTION=$(printf '%s\n' \
              '' \
              '' \
              '---' \
              '**Copilot agent instruction:** When your work is complete, create a' \
              'pull request targeting main.' \
              'Title format: [PREFIX]: [DIRECTIVE-ID] — [short description]' \
              'Labels: copilot-task, ready-for-review' \
              'If this directive is FIZ-scoped (FIZ: YES in header), also add' \
              'label fiz-review-required.')

            gh issue create \
              --title "$TITLE" \
              --body "$(cat "$FILE")$PR_INSTRUCTION" \
              --label "copilot-task" \
            && echo "✅ Issue created for ${ID}" \
            || echo "⚠️  Issue creation failed or already exists for ${ID} — skipping"
          done <<< "${{ steps.detect.outputs.new_files }}"
